name: obsidrive
description: "Google Drive-synced Obsidian vault markdown reader"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Google Auth & Drive
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Local storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  sqflite: ^2.4.1

  # Markdown
  flutter_markdown: ^0.7.7+1

  # Network
  connectivity_plus: ^6.1.4

  # UI
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  mockito: ^5.4.6

flutter:
  uses-material-design: true
